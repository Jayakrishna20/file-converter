name: release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
            
      - name: Push to Cloudsmith
        run: |
          # Install the official Cloudsmith command-line tool
          pip3 install --upgrade cloudsmith-cli
          
          # Tell Cloudsmith to upload the freshly built files
          for file in dist/*.deb; do
            cloudsmith push deb jayakrishna20/file-converter/ubuntu/any-version "$file"
          done
          for file in dist/*.rpm; do
            cloudsmith push rpm jayakrishna20/file-converter/fedora/any-version "$file"
          done
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}

